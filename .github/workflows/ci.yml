name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.0.x']

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore tests/JG.AuditKit.Tests/JG.AuditKit.Tests.csproj

      - name: Build
        run: dotnet build tests/JG.AuditKit.Tests/JG.AuditKit.Tests.csproj --no-restore --configuration Release -warnaserror

      - name: Test
        run: dotnet test tests/JG.AuditKit.Tests/JG.AuditKit.Tests.csproj --no-build --configuration Release --verbosity normal
